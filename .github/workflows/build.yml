name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: AlgoQuest-macOS.zip
          - os: windows-latest
            artifact_name: AlgoQuest-Windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install pygame pyinstaller

      - name: Build
        run: pyinstaller algoquest.spec --noconfirm

      - name: Empacotar (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../AlgoQuest-macOS.zip AlgoQuest.app

      - name: Empacotar (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\AlgoQuest -DestinationPath AlgoQuest-Windows.zip
        shell: pwsh

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Baixar artefatos
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publicar Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AlgoQuest-macOS.zip
            AlgoQuest-Windows.zip
          generate_release_notes: true
